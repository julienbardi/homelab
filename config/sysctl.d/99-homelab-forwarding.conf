# config/sysctl.d/99-homelab-forwarding.conf
# -------------------------------------------------------------------------
# SOURCE: homelab repo (installed via 'make install-homelab-sysctl')
# -------------------------------------------------------------------------
# MANDATORY FOR: WireGuard, Tailscale, and LAN-to-WAN routing.
# This file enforces the IPv6 stack at the kernel level to resolve the
# "Ghost IP" discrepancy between UGOS GUI and the Linux CLI.

# --- IPv4 Forwarding ---
# Enables the NAS to route IPv4 traffic between wgN and the physical LAN.
net.ipv4.ip_forward = 1

# --- IPv6 Forwarding ---
# Required for Symmetric GUA/ULA WireGuard contract (Option B).
# Specifically enables routing for the physical interface (eth0).
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1
net.ipv6.conf.eth0.forwarding = 1

# --- IPv6 Stack Enforcement ---
# Force-enables the IPv6 stack.
# Must be '0' for the ULA (fd89:7a3b:42c0::4) to be visible to the kernel.
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0
net.ipv6.conf.lo.disable_ipv6 = 0
