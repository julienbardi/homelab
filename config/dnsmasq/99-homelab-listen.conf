# 99-homelab-listen.conf
# Deploy with:
#     make deploy-dnsmasq-config
#
# dnsmasq = LAN + WireGuard DNS/RA frontend
# unbound = local recursive resolver (127.0.0.1#5335)
# dnsdist = DoH gateway for WireGuard only (port 8053)
#
# Ugreen OS does NOT bind dnsmasq to eth0 automatically.
# Therefore dnsmasq must explicitly bind to the LAN IPv4 address
# to provide DNS service to local clients.

# ------------------------------------------------------------
# Disable DHCP lease storage (Ugreen OS has no /var/lib/misc)
# ------------------------------------------------------------
dhcp-leasefile=/dev/null

# ------------------------------------------------------------
# Listening addresses (explicit and deterministic)
# ------------------------------------------------------------

# IPv4: explicitly bind to LAN interface (eth0)
listen-address=10.89.12.4

# IPv6: bind only to ::1 (stable, always-present)
# Never bind to global IPv6 on eth0 (dynamic SLAAC + privacy)
listen-address=::1

# Enforce binding only to the addresses above
bind-interfaces

# DNS service port
port=53

# ------------------------------------------------------------
# Upstream resolver (Unbound)
# ------------------------------------------------------------
server=127.0.0.1#5335
proxy-dnssec

# ------------------------------------------------------------
# Safety defaults
# ------------------------------------------------------------
no-resolv
no-poll
neg-ttl=60

# ------------------------------------------------------------
# IPv6 Router Advertisements for WireGuard interfaces
# ------------------------------------------------------------
# Each wgX interface advertises its own ULA /64.
# Clients receive:
#   - IPv6 address
#   - Default gateway (::1 on wgX)
#   - DNS server (::1 on wgX)
#   - Prefix lifetime + RA parameters

interface-name=wg0,*
enable-ra
dhcp-range=::100,::1ff,constructor:wg0,ra-names,64
dhcp-option=option6:dns-server,[::1]

interface-name=wg1,*
enable-ra
dhcp-range=::100,::1ff,constructor:wg1,ra-names,64
dhcp-option=option6:dns-server,[::1]

