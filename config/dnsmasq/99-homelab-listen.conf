# 99-homelab-listen.conf
#
# Deploy with:
#     make deploy-dnsmasq-config
#
# dnsmasq = LAN + WireGuard DNS/RA frontend
# unbound = local recursive resolver (127.0.0.1#5335)
# dnsdist = DoH gateway for WireGuard only (port 8053)
#
# UGOS NOTE:
# UGOS brings up IPv6 addresses (including ULAs) *after* dnsmasq starts.
# Explicit listen-address bindings cause dnsmasq to fail if an address
# does not yet exist. To avoid this race condition, dnsmasq is configured
# to listen on ALL IPv4/IPv6 addresses on all interfaces.
#
# This is safe because:
#   - dnsmasq still binds only to port 53
#   - WireGuard RA/DHCPv6 ranges remain explicit
#   - Unbound upstream remains explicit
#   - No accidental exposure: firewall controls external access
#
# This mode guarantees stable startup on UGOS.

# ------------------------------------------------------------
# Disable DHCP lease storage (UGOS has no /var/lib/misc)
# ------------------------------------------------------------
dhcp-leasefile=/dev/null

# ------------------------------------------------------------
# Listening mode (wildcard, UGOS‑safe)
# ------------------------------------------------------------
# Listen on all IPv4 and IPv6 addresses.
# This avoids startup failures caused by UGOS assigning IPv6 ULAs late.
# Listen on all IPv4 and IPv6 addresses on LAN-facing interfaces.
# UGOS may assign IPv6 addresses (including ULAs) after dnsmasq starts.
# We avoid bind-interfaces to allow wildcard IPv6 binding.
# interface= restricts binding to LAN NICs only (eth0, eth1, br0).
interface=eth0
interface=eth1
interface=br0

listen-address=0.0.0.0
listen-address=::

# DNS service port
port=53

# ------------------------------------------------------------
# Upstream resolver (Unbound)
# ------------------------------------------------------------
server=127.0.0.1#5335
# IPv6 ULA upstream is intentionally disabled because UGOS
# may not have the ULA assigned at dnsmasq startup.
#server=[fd89:7a3b:42c0::4]:5335
proxy-dnssec

# ------------------------------------------------------------
# Safety defaults
# ------------------------------------------------------------
no-resolv
no-poll
neg-ttl=60

# ------------------------------------------------------------
# IPv6 Router Advertisements for WireGuard interfaces
# ------------------------------------------------------------
# Each wgX interface advertises its own ULA /64.
# Clients receive:
#   - IPv6 address
#   - Default gateway (::1 on wgX)
#   - DNS server (::1 on wgX)
#   - Prefix lifetime + RA parameters

interface-name=wg0,wg0
enable-ra
dhcp-range=::100,::1ff,constructor:wg0,ra-names,64
dhcp-option=option6:dns-server,[::1]

interface-name=wg1,wg1
enable-ra
dhcp-range=::100,::1ff,constructor:wg1,ra-names,64
dhcp-option=option6:dns-server,[::1]

interface-name=wg2,wg2
enable-ra
dhcp-range=::100,::1ff,constructor:wg2,ra-names,64
dhcp-option=option6:dns-server,[::1]

