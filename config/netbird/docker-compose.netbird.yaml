version: "3.9"

services:
  management:
    image: netbirdio/management:latest
    container_name: netbird-management
    restart: unless-stopped
    environment:
      NB_MANAGEMENT_API_PORT: 33073
      NB_MANAGEMENT_GRPC_PORT: 33073
      NB_MANAGEMENT_LOG_LEVEL: info
      NB_MANAGEMENT_DATA_DIR: /var/lib/netbird
      NB_MANAGEMENT_LETSENCRYPT_DOMAIN: ""
      NB_MANAGEMENT_AUTH_OIDC_ENABLED: "false"
    volumes:
      - netbird-data:/var/lib/netbird
    ports:
      - "10.89.12.4:33073:33073/tcp"

  signal:
    image: netbirdio/signal:latest
    container_name: netbird-signal
    restart: unless-stopped
    environment:
      NB_SIGNAL_PORT: 33075
      NB_SIGNAL_LOG_LEVEL: info
    ports:
      - "10.89.12.4:33075:33075/tcp"

  relay:
    image: netbirdio/relay:latest
    container_name: netbird-relay
    restart: unless-stopped
    environment:
      NB_RELAY_PORT: 33080
      NB_RELAY_LOG_LEVEL: info
    ports:
      - "10.89.12.4:33080:33080/tcp"

  stun:
    image: coturn/coturn:latest
    container_name: netbird-stun
    restart: unless-stopped
    environment:
      NB_STUN_PORT: 3478
      NB_STUN_LOG_LEVEL: info
    ports:
      - "10.89.12.4:3478:3478/udp"

volumes:
  netbird-data:
