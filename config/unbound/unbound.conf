# /etc/unbound/unbound.conf
#
# Purpose:
#   Recursive DNS resolver backend for the homelab.
#   - Listens on localhost for local resolvers (dnsmasq, systemd-resolved)
#   - Listens on LAN IP for the router only
#   - Provides validated, DNSSEC-aware recursion
#
# Deployment procedure:
#   sudo unbound-checkconf /home/julie/src/homelab/config/unbound/unbound.conf
#   sudo install -o root -g root -m 0644 /home/julie/src/homelab/config/unbound/unbound.conf /etc/unbound/unbound.conf
#   sudo systemctl restart unbound
#
# One-time setup:
#   sudo systemctl enable unbound
#
# Verification:
#   sudo systemctl status unbound
#   sudo journalctl -u unbound -f

server:
    # Listen on loopback for local DNS frontends
    interface: 127.0.0.1
    interface: ::1

    # Listen on LAN IP for router-only recursion
    interface: 10.89.12.4
    #interface: fd89:7a3b:42c0::4

    # Allow outbound queries via any interface (IPv4 and IPv6)
    outgoing-interface: 0.0.0.0
    outgoing-interface: ::

    # Backend resolver port (dnsmasq forwards here)
    port: 5335

    # Enable IPv6 support for clients, but prefer IPv4 for upstream recursion
    do-ip6: yes
    prefer-ip6: no

    # Run as unprivileged user
    username: "unbound"
    pidfile: ""
    do-daemonize: no

    # Local override for Headscale DERP endpoint
    # Prevents recursion and enforces split-horizon behavior
    local-data: "derp.vpn.bardi.ch. A 127.0.0.1"

    # Enable DNSSEC validation and iterative resolution
    module-config: "validator iterator"

    # Allow querying localhost (required for local resolvers)
    do-not-query-localhost: no

    # DNSSEC trust anchor and root hints
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    val-permissive-mode: no
    root-hints: "/var/lib/unbound/root.hints"

    # ------------------------------------------------------------
    # Access control
    # ------------------------------------------------------------
    # Access control model:
    # - Unbound is not a client-facing resolver.
    # - Only local resolvers (dnsmasq, systemd-resolved) and the router
    #   are allowed to query Unbound directly.
    # - WireGuard and Tailscale clients never reach Unbound; they send DNS
    #   to the router, which forwards queries on their behalf.
    # - Therefore, no explicit access-control entries are required for
    #   WireGuard or Tailscale address ranges.

    # Allow local processes (dnsmasq, systemd-resolved, diagnostics)
    access-control: 127.0.0.1/32 allow
    access-control: ::1/128 allow
    access-control: 127.0.0.0/8 allow

    # Allow the NAS to query itself on its LAN IP
    access-control: 10.89.12.4/32 allow

    # Allow recursion from the router (IPv4 and ULA)
    access-control: 10.89.12.1/32 allow

	access-control: fd89:7a3b:42c0::1/128 allow
    # Allow the NAS to query itself on ULA
    access-control: fd89:7a3b:42c0::4/128 allow

    # Explicitly refuse all other LAN clients
    access-control: 10.89.12.0/24 refuse
    access-control: fd89:7a3b:42c0::/64 refuse

    # ------------------------------------------------------------
    # Performance tuning (Optimized for local DNSSEC recursion)
    # ------------------------------------------------------------
    # Unbound runs with 5 worker threads on the Intel Gold 8505,
    # providing parallel DNSSEC‑validating recursion for LAN and router.
    num-threads: 5

    # Use 8 cache slabs (power of 2) to minimize lock contention
    # across multiple threads.
    msg-cache-slabs: 8
    rrset-cache-slabs: 8
    infra-cache-slabs: 8
    key-cache-slabs: 8

    # Large cache sizes to support the 100k+ dns-warm domain list.
    # These values prevent eviction and keep recursion latency low.
    msg-cache-size: 256m
    rrset-cache-size: 512m
    key-cache-size: 128m
    neg-cache-size: 64m

    # Use DNSSEC NSEC/NSEC3 records aggressively to synthesize
    # NXDOMAIN responses without upstream queries.
    aggressive-nsec: yes

    # Prefetch popular records before expiry to keep cache warm
    # and reduce cold-recursion latency.
    prefetch: yes
    prefetch-key: yes

    # High concurrency for parallel upstream queries.
    # outgoing-range controls the number of simultaneous queries.
    outgoing-range: 8192
    num-queries-per-thread: 16384

    # Serve expired records while refreshing in the background.
    # This avoids latency spikes when upstream is slow.
    serve-expired: yes

    # Socket tuning for high throughput and reduced packet drops.
    so-reuseport: yes
    so-rcvbuf: 8m
    so-sndbuf: 8m

    # Privacy and minimisation features.
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes

    # Moderate verbosity for operational visibility and dns-health metrics.
    verbosity: 2
    extended-statistics: yes

# ------------------------------------------------------------
# Authoritative-only resolution for bardi.ch
# ------------------------------------------------------------
# Delegate bardi.ch to its authoritative nameservers
# Prevents unnecessary recursion for local domain
stub-zone:
    name: "bardi.ch."
    stub-host: ns11.infomaniak.ch
    stub-host: ns12.infomaniak.ch

# ------------------------------------------------------------
# Recursive forwarding (boot‑time fallback only)
# ------------------------------------------------------------
# Unbound performs full DNSSEC‑validating recursion once the
# system is fully online. However, during early boot the network
# stack may not yet be ready for root‑server recursion.
#
# These forwarders provide a safe fallback path during boot.
# dns-health and dns-warm will disable forwarding after startup
# to restore full local recursion for optimal performance.
#
forward-zone:
    name: "."

    # Cloudflare (fallback)
    forward-addr: 1.1.1.1
    forward-addr: 1.0.0.1

    # Quad9 (fallback)
    forward-addr: 9.9.9.9
    forward-addr: 149.112.112.112

    # Digitale Gesellschaft (CH) (fallback)
    forward-addr: 185.95.218.42
    forward-addr: 185.95.218.43

# ------------------------------------------------------------
# Remote control interface
# ------------------------------------------------------------
# Enables unbound-control for runtime inspection and management
remote-control:
    control-enable: yes
    control-interface: /run/unbound.ctl
    server-key-file: /etc/unbound/unbound_server.key
    server-cert-file: /etc/unbound/unbound_server.pem
    control-key-file: /etc/unbound/unbound_control.key
    control-cert-file: /etc/unbound/unbound_control.pem
